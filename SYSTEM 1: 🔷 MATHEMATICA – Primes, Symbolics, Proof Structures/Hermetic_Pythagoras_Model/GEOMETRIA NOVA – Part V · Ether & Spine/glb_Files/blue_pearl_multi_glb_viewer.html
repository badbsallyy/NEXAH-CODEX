<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Blue Pearl – Multi-GLB Viewer</title>
  <style>
    html,body{margin:0;height:100%;background:#0e1726;color:#e9f1ff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    #ui{position:fixed;top:12px;left:12px;background:rgba(18,22,34,.9);padding:10px 12px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.35);max-width:360px}
    .row{margin:6px 0}
    .list{max-height:220px;overflow:auto;margin-top:6px;border:1px solid #26354f;border-radius:8px;padding:6px}
    input[type=range]{width:160px}
    a.btn{display:inline-block;margin-top:6px;padding:6px 10px;background:#20304a;color:#e9f1ff;text-decoration:none;border-radius:8px}
  </style>
</head>
<body>
<div id="ui">
  <div class="row"><b>Breath</b> <input id="breath" type="range" min="0" max="2" value="1" step="0.01"> <span id="breathv">1.00x</span></div>
  <div class="row"><b>Exposure</b> <input id="expo" type="range" min="0.6" max="1.4" value="1" step="0.01"> <span id="expov">1.00</span></div>
  <div class="row"><b>Loaded Models</b></div>
  <div class="list" id="modellist"></div>
  <div class="row"><a class="btn" href="manifest.json" download>manifest.json</a></div>
</div>
<canvas id="c"></canvas>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('c'), antialias:true});
renderer.setSize(W,H); renderer.setPixelRatio(Math.min(2, window.devicePixelRatio||1));
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#0e1726');

const camera = new THREE.PerspectiveCamera(45, W/H, 0.01, 100);
camera.position.set(0, 1.8, 3.2);
const controls = new THREE.OrbitControls(camera, renderer.domElement);

const hemi = new THREE.HemisphereLight(0xffffff, 0x223344, 0.8); scene.add(hemi);
const key = new THREE.DirectionalLight(0xfff0cc, 1.0); key.position.set(3,2,2); scene.add(key);
const rim = new THREE.DirectionalLight(0xaaccff, 0.6); rim.position.set(-2,1,-3); scene.add(rim);

const root = new THREE.Group(); scene.add(root);

const loader = new THREE.GLTFLoader();
const listEl = document.getElementById('modellist');

async function loadManifest(){
  const mf = await (await fetch('manifest.json')).json();
  for(const fname of mf.models){
    await loadModel(fname);
  }
}
function checkboxRow(name, obj){
  const id = 'id_'+Math.random().toString(36).slice(2);
  const div = document.createElement('div');
  div.className = 'row';
  div.innerHTML = '<label><input type="checkbox" id="'+id+'" checked> '+name+'</label>';
  listEl.appendChild(div);
  const cb = div.querySelector('input');
  cb.addEventListener('change', ()=> obj.visible = cb.checked);
}
async function loadModel(fname){
  return new Promise((resolve,reject)=>{
    loader.load(fname, (gltf)=>{
      const group = new THREE.Group();
      group.name = fname;
      group.add(gltf.scene);
      // normalize: center based on bounding box
      const box = new THREE.Box3().setFromObject(group);
      const size = new THREE.Vector3(); box.getSize(size);
      const center = new THREE.Vector3(); box.getCenter(center);
      group.position.sub(center.multiplyScalar(1)); // center to origin
      // scale huge posters down a bit
      const maxDim = Math.max(size.x,size.y,size.z);
      if(maxDim > 10) group.scale.setScalar(10/maxDim);
      root.add(group);
      checkboxRow(fname, group);
      resolve();
    }, undefined, (err)=>{ console.error('Load error', fname, err); resolve(); });
  });
}

loadManifest();

// Breath animation: subtle global pulsation
const breath = document.getElementById('breath');
const breathv = document.getElementById('breathv');
breath.addEventListener('input', ()=> breathv.textContent = parseFloat(breath.value).toFixed(2)+'x');

const expo = document.getElementById('expo');
const expov = document.getElementById('expov');
expo.addEventListener('input', ()=>{ renderer.toneMappingExposure = parseFloat(expo.value); expov.textContent = renderer.toneMappingExposure.toFixed(2); });

let t0 = performance.now();
function tick(){
  const t = (performance.now()-t0)/1000;
  const speed = parseFloat(breath.value);
  const s = 1 + 0.03*Math.sin(2*Math.PI*(t/8)*speed);
  root.scale.set(s, s, s);
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();

window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h; camera.updateProjectionMatrix(); renderer.setSize(w,h);
});
</script>
</body>
</html>
